# Cloud Build config for JalSeva — build container with NEXT_PUBLIC_*
# substituted as Docker build args, push to Artifact Registry, then deploy
# to Cloud Run asia-east1 with the runtime IAM service account.

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - build
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=${_FIREBASE_API_KEY}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_FIREBASE_AUTH_DOMAIN}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_FIREBASE_STORAGE_BUCKET}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_FIREBASE_MESSAGING_SENDER_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=${_FIREBASE_APP_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${_FIREBASE_MEASUREMENT_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${_MAPS_API_KEY}'
      - '-t'
      - 'asia-east1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/jalseva:${BUILD_ID}'
      - '-t'
      - 'asia-east1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/jalseva:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args: ['push', '--all-tags', 'asia-east1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/jalseva']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: 'deploy'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - jalseva
      - '--image'
      - 'asia-east1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/jalseva:${BUILD_ID}'
      - '--region'
      - 'asia-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--service-account'
      - 'jalseva-runtime@${PROJECT_ID}.iam.gserviceaccount.com'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--cpu'
      - '1'
      - '--memory'
      - '512Mi'
      - '--concurrency'
      - '80'
      - '--timeout'
      - '300'
      - '--set-env-vars'
      - 'NODE_ENV=production,CLUSTER_WORKERS=1,FIREBASE_ADMIN_PROJECT_ID=${PROJECT_ID},FIREBASE_ADMIN_STORAGE_BUCKET=${_FIREBASE_STORAGE_BUCKET},GOOGLE_GEMINI_API_KEY=${_GEMINI_API_KEY},NEXT_PUBLIC_RAZORPAY_KEY_ID=rzp_sim_jalseva,RAZORPAY_KEY_ID=rzp_sim_jalseva,RAZORPAY_KEY_SECRET=sim_secret_jalseva,PHONE_OTP_DAILY_LIMIT=2'

images:
  - 'asia-east1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/jalseva:${BUILD_ID}'
  - 'asia-east1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/jalseva:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1800s
