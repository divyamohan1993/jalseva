version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/jalseva"
    versioning-strategy: "increase"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    groups:
      next-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react*"
      firebase:
        patterns:
          - "firebase"
          - "firebase-admin"
      lint-and-test:
        patterns:
          - "@biomejs/biome"
          - "vitest"
          - "@testing-library/*"
          - "jsdom"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "ci"
    commit-message:
      prefix: "ci"

  - package-ecosystem: "docker"
    directory: "/jalseva"
    schedule:
      interval: "weekly"
    labels:
      - "ci"
      - "docker"
    commit-message:
      prefix: "ci"
